<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大阪京都旅遊手冊</title>
    <style>
        :root {
            --primary-red: #B85042;
            --bg-color: #f7f7f7;
            --card-bg: #ffffff;
            --accent-green: #A7BEAE;
        }
        body {
            font-family: -apple-system, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 15px; line-height: 1.6;
        }
        .container { max-width: 600px; margin: 0 auto; }
        
        /* Tab 樣式 */
        .tabs {
            display: flex; background: #eee; border-radius: 10px;
            margin-bottom: 20px; padding: 5px;
        }
        .tab-btn {
            flex: 1; padding: 12px; border: none; background: none;
            cursor: pointer; font-weight: bold; color: #666;
            border-radius: 8px; transition: 0.3s;
        }
        .tab-btn.active {
            background: white; color: var(--primary-red);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Header & Cards */
        .header {
            background: var(--primary-red);
            color: white; padding: 25px 20px;
            border-radius: 15px; text-align: center; margin-bottom: 20px;
        }
        .flight-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .flight-card { background: white; padding: 15px; border-radius: 10px; border: 1px solid #eee; font-size: 0.85em; }

        .day-box, .info-box {
            background: white; border-radius: 12px;
            padding: 20px; margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .day-header {
            border-bottom: 2px solid var(--primary-red); padding-bottom: 10px; margin-bottom: 15px;
            color: var(--primary-red); font-weight: bold; font-size: 1.1em;
        }
        
        .activity, .note-item { padding: 12px 0; border-bottom: 1px dashed #eee; }
        .activity:last-child, .note-item:last-child { border-bottom: none; }
        .act-name { font-weight: bold; display: block; color: #333; }
        .act-desc { color: #666; font-size: 0.9em; margin: 4px 0; }

        .map-link {
            display: inline-flex; align-items: center; background: #fff;
            color: var(--primary-red); border: 1px solid var(--primary-red);
            padding: 4px 12px; border-radius: 20px; text-decoration: none;
            font-size: 0.8em; margin-top: 8px;
        }

        .tag {
            font-size: 0.75em; padding: 2px 8px; border-radius: 4px;
            margin-right: 5px; color: white; background: var(--accent-green);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0">🗾 大阪京都旅遊手冊</h2>
        <p style="margin:5px 0 0 0; opacity:0.9">2026.05.14 - 05.19</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('itinerary')">🗓️ 詳細行程</button>
        <button class="tab-btn" onclick="openTab('notes')">⚠️ 注意事項</button>
    </div>

    <div id="itinerary" class="tab-content active">
        <div class="flight-grid">
            <div class="flight-card"><h4>去 BR 182 (T1)</h4>KHH 07:05<br>➔ KIX 11:10</div>
            <div class="flight-card"><h4>回 BR 147 (T1)</h4>KIX 20:35<br>➔ KHH 22:55</div>
        </div>
        <div id="itinerary-list"></div>
    </div>

    <div id="notes" class="tab-content">
        <div class="info-box">
            <div class="day-header">🧳 航空公司規定</div>
            <div class="note-item"><span class="tag">隨身</span> 行動電源、電池、打火機(1個)必須隨身，禁止託運。</div>
            <div class="note-item"><span class="tag">託運</span> 腳架、自拍棒、液體(>100ml)必須託運。</div>
        </div>
        <div class="info-box">
            <div class="day-header">🚆 交通規定與禮儀</div>
            <div class="note-item"><span class="tag">搭車</span> 車廂內保持安靜，將手機轉為靜音模式。</div>
            <div class="note-item"><span class="tag">IC卡</span> 下車前確認 ICOCA 餘額，便利商店也可加值。</div>
        </div>
    </div>
</div>

<script>
    // --- 行程資料區：天數格式已修改為「第X天」 ---
    const tripData = [
        {
            dayText: "第一天", date: "05/14(三)", title: "抵達京都",
            activities: [
                { name: "京都八條都酒店", desc: "飯店 Check-in 放置行李", map: "https://goo.gl/maps/example1" },
                { name: "祇園花見小路", desc: "散策、晚餐、感受京都風情", map: "https://goo.gl/maps/example2" }
            ]
        },
        {
            dayText: "第二天", date: "05/15(四)", title: "清水寺巡禮",
            activities: [
                { name: "清水寺 / 二年坂", desc: "和服體驗、拍攝大舞台", map: "https://goo.gl/maps/example3" }
            ]
        }
        // 您可以依照這個格式繼續增加第三天、第四天...
    ];

    function openTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function render() {
        const list = document.getElementById('itinerary-list');
        list.innerHTML = tripData.map(day => `
            <div class="day-box">
                <div class="day-header">${day.dayText} ${day.date}</div>
                <div style="font-size:0.9em; color:#666; margin-bottom:10px;">${day.title}</div>
                ${day.activities.map(act => `
                    <div class="activity">
                        <span class="act-name">📍 ${act.name}</span>
                        <div class="act-desc">${act.desc}</div>
                        ${act.map ? `<a href="${act.map}" target="_blank" class="map-link">🗺️ 查看地圖</a>` : ''}
                    </div>
                `).join('')}
            </div>
        `).join('');
    }

    window.onload = render;
</script>

</body>
</html>
