<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 日本旅程・景點導覽</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        :root { --jp-red: #A64B2A; --bg-paper: #FAF9F6; }
        body { background-color: var(--bg-paper); font-family: 'Inter', 'Noto Serif TC', serif; color: #333; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px); border-top: 1px solid rgba(0,0,0,0.05); }
        .card { background: white; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .nav-active { color: var(--jp-red); font-weight: 700; }
    </style>
</head>
<body class="pb-32">

    <header class="px-8 pt-12 pb-8 flex justify-between items-start">
        <div>
            <h1 class="text-3xl font-light tracking-tight text-gray-800 italic font-serif">Kansai <span class="text-[#A64B2A]">2026</span></h1>
            <p class="text-[10px] tracking-[0.3em] text-gray-400 mt-1 uppercase font-semibold">Travel Itinerary</p>
        </div>
        <div id="realtime-weather" class="text-right">
            <div class="flex items-center justify-end gap-2">
                <span id="weather-icon" class="text-2xl">--</span>
                <span id="weather-temp" class="text-2xl font-light">--°C</span>
            </div>
            <p id="weather-desc" class="text-[9px] text-gray-400 font-medium">Updating Live Data...</p>
        </div>
    </header>

    <main id="tab-itinerary" class="tab-content active px-6">
        <div class="flex gap-6 overflow-x-auto no-scrollbar mb-8 py-2 border-b border-gray-100" id="date-slider"></div>
        <div id="itinerary-list" class="space-y-8"></div>
    </main>

    <section id="tab-tools" class="tab-content px-6 space-y-6">
        <div class="card p-6 border border-gray-50">
            <h3 class="font-serif text-lg mb-4 border-l-4 border-[#A64B2A] pl-3">交通路線圖</h3>
            <div class="space-y-4">
                <div class="relative rounded-2xl overflow-hidden shadow-inner bg-gray-100">
                    <img src="https://www.city.kyoto.lg.jp/kotsu/cmsfiles/contents/0000008/8932/04rosenzu.png" class="w-full h-48 object-cover">
                </div>
                <div class="flex flex-col gap-3">
                    <a href="https://www.city.kyoto.lg.jp/kotsu/cmsfiles/contents/0000008/8932/04rosenzu.png" target="_blank" class="w-full py-4 rounded-2xl bg-gray-800 text-white text-center text-[11px] font-bold tracking-widest">點擊開啟京都地圖 HD</a>
                    <a href="https://subway.osakametro.co.jp/guide/library/rosenzu/20240323_osakametro_rosenzu.pdf" target="_blank" class="w-full py-4 rounded-2xl border border-gray-200 text-center text-[11px] font-medium text-gray-600">大阪地鐵 PDF 檔案</a>
                </div>
            </div>
        </div>
        <div class="card p-6 bg-[#A64B2A]/5">
            <h3 class="font-serif text-lg border-l-4 border-gray-300 pl-3 mb-4 text-gray-700">緊急聯絡資訊</h3>
            <div class="text-sm space-y-4 font-light text-gray-600">
                <div class="flex justify-between"><span>警察局/緊急救援</span><span class="font-bold">110 / 119</span></div>
                <div class="flex justify-between"><span>長榮航空 (KIX)</span><span class="font-bold">072-456-5386</span></div>
                <div class="flex justify-between"><span>日本外務省諮詢</span><span class="font-bold">03-3580-3311</span></div>
            </div>
        </div>
    </section>

    <nav class="fixed bottom-0 left-0 right-0 h-24 glass-nav flex justify-around items-center px-10 z-50">
        <button onclick="changeTab('itinerary', this)" class="nav-btn nav-active flex flex-col items-center gap-1 transition-all">
            <i class="fa-solid fa-compass text-xl"></i><span class="text-[9px] font-bold uppercase tracking-widest">Plan</span>
        </button>
        <button onclick="changeTab('tools', this)" class="nav-btn flex flex-col items-center gap-1 text-gray-300 transition-all">
            <i class="fa-solid fa-map text-xl"></i><span class="text-[9px] font-bold uppercase tracking-widest">Map</span>
        </button>
    </nav>

<script>
    // 完整 6 天行程 (純景點、交通、飯店)
    const tripData = [
        { day: "D1", date: "05/14", week: "Thu", city: "Kyoto", activities: [
            { time: "07:05", type: "Transport", name: "高雄小港機場 (KHH)", note: "搭乘長榮航空 **BR 182**。", icon: "fa-plane" },
            { time: "11:10", type: "Transport", name: "關西國際機場 (KIX)", note: "辦理入境，搭乘 HARUKA 前往京都。", icon: "fa-train" },
            { time: "15:00", type: "Stay", name: "京都八條都酒店", note: "**預約代號: MY92837**。放置行李。", icon: "fa-hotel", map: "https://maps.google.com/?q=New+Miyako+Hotel+Kyoto" },
            { time: "17:00", type: "Spot", name: "京都車站 / 站前散策", note: "欣賞京都塔與車站建築設計。", icon: "fa-building" }
        ]},
        { day: "D2", date: "05/15", week: "Fri", city: "Kyoto/Osaka", activities: [
            { time: "09:30", type: "Spot", name: "清水寺", note: "💡 導遊筆記：世界文化遺產，全木造舞台。", icon: "fa-torii-gate", map: "https://maps.google.com/?q=Kiyomizu-dera" },
            { time: "11:30", type: "Spot", name: "二年坂 / 三年坂", note: "日式古街散策，通往八坂塔。", icon: "fa-shoe-prints" },
            { time: "15:30", type: "Spot", name: "金閣寺", note: "欣賞舍利殿金色建築。", icon: "fa-landmark" },
            { time: "19:00", type: "Stay", name: "艾思利德酒店 難波南III", note: "大阪 Check-in。", icon: "fa-key" }
        ]},
        { day: "D3", date: "05/16", week: "Sat", city: "Sea Kyoto", activities: [
            { time: "08:30", type: "Transport", name: "海之京都包車/巴士", note: "**預約編號: 72635**。", icon: "fa-bus" },
            { time: "11:00", type: "Spot", name: "天橋立", note: "日本三景之一，搭乘纜車俯瞰龍昇觀。", icon: "fa-mountain", map: "https://maps.google.com/?q=Amanohashidate" },
            { time: "14:00", type: "Spot", name: "伊根舟屋", note: "搭乘遊船欣賞獨特的舟屋建築。", icon: "fa-ship" }
        ]},
        { day: "D4", date: "05/17", week: "Sun", city: "Osaka", activities: [
            { time: "11:00", type: "Spot", name: "大阪城公園", note: "參觀天守閣與護城河景觀。", icon: "fa-fort-awesome", map: "https://maps.google.com/?q=Osaka+Castle" },
            { time: "15:00", type: "Spot", name: "通天閣 / 新世界", note: "昭和風情老街與獅子頭展望台。", icon: "fa-tower-observation" },
            { time: "18:00", type: "Spot", name: "心齋橋 / 道頓堀", note: "欣賞固力果跑跑人霓虹燈。", icon: "fa-lightbulb" }
        ]},
        { day: "D5", date: "05/18", week: "Mon", city: "Kobe", activities: [
            { time: "10:30", type: "Spot", name: "神戶動物王國", note: "近距離接觸水豚、企鵝。", icon: "fa-paw", map: "https://maps.google.com/?q=Kobe+Animal+Kingdom" },
            { time: "15:00", type: "Spot", name: "神戶港海洋博物館", note: "神戶地標與港灣夜景散策。", icon: "fa-anchor" }
        ]},
        { day: "D6", date: "05/19", week: "Tue", city: "Return", activities: [
            { time: "10:00", type: "Spot", name: "難波八阪神社", note: "獅子殿巨大頭像，祈求旅程平安。", icon: "fa-om", map: "https://maps.google.com/?q=Namba+Yasaka+Shrine" },
            { time: "13:00", type: "Spot", name: "臨空城 Outlet", note: "搭機前最後採買購物。", icon: "fa-bag-shopping" },
            { time: "20:35", type: "Transport", name: "關西機場 (KIX)", note: "搭乘 **BR 147** 返回高雄。", icon: "fa-plane-arrival" }
        ]}
    ];

    async function fetchWeather() {
        try {
            const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=34.69&longitude=135.50&current_weather=true');
            const data = await res.json();
            document.getElementById('weather-temp').innerText = `${Math.round(data.current_weather.temperature)}°C`;
            document.getElementById('weather-icon').innerText = data.current_weather.weathercode < 3 ? "☀️" : "☁️";
            document.getElementById('weather-desc').innerText = "Live: Osaka/Kyoto";
        } catch (e) { document.getElementById('weather-desc').innerText = "Offline Mode"; }
    }

    function changeTab(tabId, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById(`tab-${tabId}`).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.add('text-gray-300'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
        el.classList.add('nav-active');
        el.classList.remove('text-gray-300');
        window.scrollTo(0, 0);
    }

    function renderDay(idx) {
        const day = tripData[idx];
        document.getElementById('itinerary-list').innerHTML = day.activities.map(act => `
            <div class="flex gap-6 group">
                <div class="flex flex-col items-center">
                    <span class="text-[9px] font-black text-gray-300">${act.time}</span>
                    <div class="w-[1px] h-full bg-gray-100 my-2 relative">
                        <div class="absolute top-0 -left-[2.5px] w-2 h-2 rounded-full bg-[#A64B2A]"></div>
                    </div>
                </div>
                <div class="flex-1 pb-10">
                    <div class="flex justify-between items-start mb-1">
                        <h4 class="text-sm font-bold text-gray-800 tracking-tight">${act.name}</h4>
                        <i class="fa-solid ${act.icon} text-gray-200 text-xs"></i>
                    </div>
                    <p class="text-[11px] text-gray-400 font-light leading-relaxed mb-4">${act.note.replace(/\*\*(.*?)\*\*/g, '<b class="text-[#A64B2A] font-bold">$1</b>')}</p>
                    ${act.map ? `
                    <a href="${act.map}" target="_blank" class="inline-flex items-center gap-2 bg-[#F2F2F2] px-6 py-2.5 rounded-full text-[9px] font-bold tracking-widest text-gray-600 uppercase transition-all active:scale-90">
                        <i class="fa-solid fa-location-arrow text-[8px]"></i> Google Maps
                    </a>` : ''}
                </div>
            </div>
        `).join('');
        document.querySelectorAll('.day-btn').forEach((b, i) => {
            b.classList.toggle('text-[#A64B2A]', i === idx);
            b.classList.toggle('border-b-2', i === idx);
            b.classList.toggle('border-[#A64B2A]', i === idx);
            b.classList.toggle('text-gray-300', i !== idx);
        });
    }

    window.onload = () => {
        const slider = document.getElementById('date-slider');
        slider.innerHTML = tripData.map((d, i) => `
            <button onclick="renderDay(${i})" class="day-btn flex-shrink-0 pb-3 text-xs font-bold text-gray-300 transition-all">
                ${d.day} <span class="text-[9px] font-light ml-0.5">${d.week}</span>
            </button>
        `).join('');
        renderDay(0);
        fetchWeather();
    };
</script>
</body>
</html>
