<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kansai Elite Travel 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Noto+Sans+TC:wght@300;500;700&display=swap');
        
        :root { 
            --navy: #1A2238; /* 深夜藍 - 主文字 */
            --gold: #C4A484; /* 香檳金 - 強調色 */
            --paper: #FDFCFB; /* 絲絨紙色 - 背景 */
            --accent: #2C3E50; /* 副標色 */
        }

        body { 
            background-color: var(--paper); 
            font-family: 'Noto Sans TC', sans-serif;
            color: var(--navy);
            -webkit-tap-highlight-color: transparent;
        }

        .serif { font-family: 'Playfair Display', serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: luxFade 0.6s ease-out; }
        @keyframes luxFade { from { opacity: 0; } to { opacity: 1; } }

        .glass-nav { 
            background: rgba(26, 34, 56, 0.95); 
            backdrop-filter: blur(10px);
        }

        .lux-card { 
            background: white; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(26, 34, 56, 0.05);
            border: 1px solid rgba(196, 164, 132, 0.2);
        }

        .gold-border { border-left: 3px solid var(--gold); }
        .nav-active { color: var(--gold) !important; }
        .nav-active i { transform: scale(1.1); }
    </style>
</head>
<body class="pb-32">

    <header class="px-8 pt-16 pb-10 bg-[#1A2238] text-white rounded-b-[40px] shadow-2xl">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="serif text-4xl italic tracking-widest text-[#C4A484]">Kansai</h1>
                <p class="text-[10px] tracking-[0.4em] opacity-60 mt-2 uppercase">Elite Private Journey 2026</p>
            </div>
            <div id="weather-box" class="text-right border-l border-white/10 pl-4">
                <span id="weather-icon" class="text-2xl block">--</span>
                <span id="weather-temp" class="text-xl font-light serif tracking-tighter">--°C</span>
            </div>
        </div>
    </header>

    <main id="tab-itinerary" class="tab-content active px-6 mt-[-30px]">
        <div class="flex gap-4 overflow-x-auto no-scrollbar mb-8 py-4" id="date-slider"></div>
        <div id="itinerary-list" class="space-y-6"></div>
    </main>

    <section id="tab-tools" class="tab-content px-6 pt-8 space-y-6">
        <div class="lux-card p-8">
            <h3 class="serif text-2xl mb-6 text-[#1A2238]">Official Guides</h3>
            <p class="text-xs text-gray-400 mb-8 leading-relaxed font-light">點擊下方按鈕可直接開啟 2026 最新官方 PDF 交通圖，建議於連網時先行下載。</p>
            
            <div class="space-y-4">
                <a href="https://www.city.kyoto.lg.jp/kotsu/cmsfiles/contents/0000008/8932/04rosenzu.png" target="_blank" class="flex items-center justify-between w-full p-5 rounded-xl bg-[#1A2238] text-[#C4A484] shadow-xl">
                    <div class="flex items-center gap-4">
                        <i class="fa-solid fa-file-pdf text-xl"></i>
                        <div class="text-left">
                            <span class="block text-sm font-bold tracking-widest">京都市地鐵公車地圖</span>
                            <span class="text-[9px] opacity-60 uppercase tracking-tighter">Kyoto City Bus & Subway (PDF)</span>
                        </div>
                    </div>
                    <i class="fa-solid fa-chevron-right text-xs"></i>
                </a>

                <a href="https://subway.osakametro.co.jp/guide/library/rosenzu/20240323_osakametro_rosenzu.pdf" target="_blank" class="flex items-center justify-between w-full p-5 rounded-xl border border-[#1A2238] text-[#1A2238]">
                    <div class="flex items-center gap-4">
                        <i class="fa-solid fa-file-pdf text-xl text-[#C4A484]"></i>
                        <div class="text-left">
                            <span class="block text-sm font-bold tracking-widest">大阪地下鐵路線圖</span>
                            <span class="text-[9px] text-gray-400 uppercase tracking-tighter">Osaka Metro Route Map (PDF)</span>
                        </div>
                    </div>
                    <i class="fa-solid fa-chevron-right text-xs opacity-30"></i>
                </a>
            </div>
        </div>
    </section>

    <nav class="fixed bottom-0 left-0 right-0 h-24 glass-nav flex justify-around items-center px-12 z-50 rounded-t-[30px]">
        <button onclick="changeTab('itinerary', this)" class="nav-btn nav-active flex flex-col items-center gap-1 text-white/40">
            <i class="fa-solid fa-calendar-check text-xl"></i><span class="text-[9px] font-bold tracking-[0.2em] uppercase">Itinerary</span>
        </button>
        <button onclick="changeTab('tools', this)" class="nav-btn flex flex-col items-center gap-1 text-white/40">
            <i class="fa-solid fa-map-location-dot text-xl"></i><span class="text-[9px] font-bold tracking-[0.2em] uppercase">Transport</span>
        </button>
    </nav>

<script>
    const tripData = [
        { day: "01", date: "05/14", week: "Thu", activities: [
            { time: "Arrive", name: "關西國際機場 (KIX)", note: "搭乘 HARUKA 特急前往京都車站。", icon: "fa-plane-arrival" },
            { time: "14:00", name: "京都車站", note: "大行李可存放於飯店或車站寄物櫃。", icon: "fa-train" },
            { time: "15:30", name: "祇園 / 花見小路", note: "💡 導遊筆記：傍晚時分有機率遇見藝伎。", icon: "fa-camera" },
            { time: "17:30", name: "四條河原町", note: "京都最繁華的商業區，適合傍晚散步。", icon: "fa-street-view" },
            { time: "Stay", name: "京都八條都酒店", note: "**預約號: MY92837**。京都站八條口對面。", icon: "fa-hotel" }
        ]},
        { day: "02", date: "05/15", week: "Fri", activities: [
            { time: "09:00", name: "璃光合服 清水寺店", note: "換裝預約。建議選振袖拍照更精緻。", icon: "fa-person-dress" },
            { time: "10:30", name: "清水寺", note: "本堂舞台參拜、音羽之瀧、地主神社。", icon: "fa-torii-gate" },
            { time: "13:30", name: "錦市場", note: "「京都的廚房」散策，觀察在地食材。", icon: "fa-basket-shopping" },
            { time: "15:30", name: "金閣寺 (鹿苑寺)", note: "欣賞舍利殿金色倒影。", icon: "fa-landmark" },
            { time: "Stay", name: "艾思利德酒店 難波南III", note: "移動至大阪。鄰近新今宮站。", icon: "fa-key" }
        ]},
        { day: "03", date: "05/16", week: "Sat", activities: [
            { time: "08:30", name: "KKDay 一日遊集合", note: "**訂單: 72635**。海之京都出發。", icon: "fa-bus" },
            { time: "11:00", name: "伊根灣遊船", note: "餵食海鷗，欣賞獨特的舟屋建築。", icon: "fa-ship" },
            { time: "13:30", name: "天橋立", note: "搭乘纜車前往飛龍觀，俯瞰日本三景。", icon: "fa-mountain" },
            { time: "16:00", name: "美山茅草屋合掌村", note: "感受靜謐的日本原風景。", icon: "fa-house" },
            { time: "20:00", name: "心齋橋 / 道頓堀", note: "固力果跑跑人霓虹燈打卡。", icon: "fa-lightbulb" }
        ]},
        { day: "04", date: "05/17", week: "Sun", activities: [
            { time: "10:00", name: "黑門市場", note: "大阪人的廚房，參觀海鮮與在地文化。", icon: "fa-fish" },
            { time: "12:30", name: "天神橋筋商店街", note: "全日本最長的商店街散策。", icon: "fa-bag-shopping" },
            { time: "15:00", name: "通天閣", note: "💡 導遊筆記：摸摸比利肯神像腳底祈福。", icon: "fa-tower-observation" },
            { time: "16:30", name: "新世界本通商店街", note: "充滿昭和時代感的復古招牌區。", icon: "fa-shop" },
            { time: "Stay", name: "艾思利德酒店 難波南III", note: "飯店休息。", icon: "fa-hotel" }
        ]},
        { day: "05", date: "05/18", week: "Mon", activities: [
            { time: "09:00", name: "神戶包車出發", note: "專屬司機前往神戶。車牌: 京200-XX", icon: "fa-car" },
            { time: "10:30", name: "神戶動物王國", note: "與水豚、小熊貓近距離接觸。", icon: "fa-paw" },
            { time: "13:30", name: "南京町", note: "日本三大中華街之一，建築色彩鮮豔。", icon: "fa-archway" },
            { time: "15:30", name: "神戶觀光船遊港", note: "從海上欣賞神戶港美景與港灣塔。", icon: "fa-anchor" },
            { time: "17:00", name: "神戶臨海樂園 umie", note: "觀賞摩天輪與神戶夜景。", icon: "fa-ferris-wheel" }
        ]},
        { day: "06", date: "05/19", week: "Tue", activities: [
            { time: "10:00", name: "難波八阪神社", note: "巨大的獅子頭像，祈求旅途圓滿。", icon: "fa-om" },
            { time: "13:00", name: "臨空城 Outlet", note: "搭機前最後採買購物。", icon: "fa-cart-shopping" },
            { time: "Departure", name: "關西國際機場 (KIX)", note: "建議提前 3 小時抵達辦理登機。", icon: "fa-plane-departure" }
        ]}
    ];

    async function fetchWeather() {
        try {
            const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=34.69&longitude=135.50&current_weather=true');
            const data = await res.json();
            document.getElementById('weather-temp').innerText = `${Math.round(data.current_weather.temperature)}°C`;
            const code = data.current_weather.weathercode;
            document.getElementById('weather-icon').innerText = code < 3 ? "☀️" : "☁️";
        } catch (e) { console.log("Weather error"); }
    }

    function changeTab(tabId, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById(`tab-${tabId}`).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
        el.classList.add('nav-active');
        window.scrollTo(0, 0);
    }

    function renderDay(idx) {
        const day = tripData[idx];
        document.getElementById('itinerary-list').innerHTML = day.activities.map(act => `
            <div class="lux-card p-6 gold-border">
                <div class="flex justify-between items-center mb-4">
                    <span class="serif text-xs font-bold text-[#C4A484] tracking-widest uppercase italic">${act.time}</span>
                    <i class="fa-solid ${act.icon} text-[#1A2238]/20"></i>
                </div>
                <h4 class="text-lg font-bold text-[#1A2238] mb-2">${act.name}</h4>
                <p class="text-xs text-[#1A2238]/60 font-light leading-relaxed">${act.note.replace(/\*\*(.*?)\*\*/g, '<b class="text-[#1A2238] font-bold">$1</b>')}</p>
            </div>
        `).join('');

        document.querySelectorAll('.day-btn').forEach((b, i) => {
            b.classList.toggle('bg-[#1A2238]', i === idx);
            b.classList.toggle('text-[#C4A484]', i === idx);
            b.classList.toggle('text-gray-400', i !== idx);
        });
    }

    window.onload = () => {
        const slider = document.getElementById('date-slider');
        slider.innerHTML = tripData.map((d, i) => `
            <button onclick="renderDay(${i})" class="day-btn flex-shrink-0 w-16 h-20 rounded-2xl flex flex-col items-center justify-center transition-all shadow-sm ${i===0?'bg-[#1A2238] text-[#C4A484]':'bg-white text-gray-400'}">
                <span class="serif text-xs italic font-bold leading-none">${d.day}</span>
                <span class="text-[9px] mt-1 font-bold uppercase tracking-tighter">${d.week}</span>
            </button>
        `).join('');
        renderDay(0);
        fetchWeather();
    };
</script>
</body>
</html>
