<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大阪京都旅遊行程 2026</title>
    <style>
        :root {
            --primary-red: #B85042;
            --bg-color: #f7f7f7;
            --card-bg: #ffffff;
        }
        body {
            font-family: -apple-system, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 15px;
            line-height: 1.6;
        }
        .container { max-width: 600px; margin: 0 auto; }
        
        /* Header */
        .header {
            background: var(--primary-red);
            color: white;
            padding: 25px 20px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 4px 12px rgba(184, 80, 66, 0.2);
        }

        /* Flight Card */
        .section-title { font-weight: bold; margin: 20px 0 10px; color: var(--primary-red); display: flex; align-items: center; }
        .flight-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .flight-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #eee;
            font-size: 0.9em;
        }
        .flight-card h4 { margin: 0 0 5px 0; color: #555; }

        /* Itinerary List */
        .day-box {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .day-header {
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .day-number { color: var(--primary-red); font-weight: bold; font-size: 1.2em; }
        
        .activity {
            padding: 12px 0;
            border-bottom: 1px dashed #eee;
        }
        .activity:last-child { border-bottom: none; }
        .act-name { font-weight: bold; display: block; margin-bottom: 5px; }
        .act-desc { color: #666; font-size: 0.9em; }

        /* Map Button */
        .map-link {
            display: inline-flex;
            align-items: center;
            background: #fff;
            color: var(--primary-red);
            border: 1px solid var(--primary-red);
            padding: 4px 12px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.8em;
            margin-top: 8px;
            transition: 0.2s;
        }
        .map-link:hover { background: var(--primary-red); color: white; }

        /* Footer */
        .footer-tools { text-align: center; margin-top: 30px; padding: 20px; opacity: 0.7; }
        .btn-json { background: none; border: 1px solid #ccc; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0">🗾 大阪京都旅遊攻略</h2>
        <p style="margin:5px 0 0 0; opacity:0.9">2026.05.14 - 05.19 (6日)</p>
    </div>

    <div class="section-title">✈️ 航班資訊 (Terminal 1)</div>
    <div class="flight-grid">
        <div class="flight-card">
            <h4>去程 BR 182</h4>
            <strong>KHH 07:05</strong><br>➔ KIX 11:10
        </div>
        <div class="flight-card">
            <h4>回程 BR 147</h4>
            <strong>KIX 20:35</strong><br>➔ KHH 22:55
        </div>
    </div>

    <div id="itinerary-content">
        </div>

    <div class="footer-tools">
        <button class="btn-json" onclick="downloadConfig()">💾 下載備份 (JSON)</button>
    </div>
</div>

<script>
    // --- 行程資料區 ---
    const tripData = [
        {
            day: 1, date: "05/14 (三)", title: "抵達關西",
            activities: [
                { name: "京都八條都酒店", desc: "飯店 Check-in 放置行李", map: "https://www.google.com/maps/search/?api=1&query=Miyako+Hotel+Kyoto+Hachijo" },
                { name: "祇園花見小路", desc: "漫步京都古街道", map: "https://www.google.com/maps/search/?api=1&query=花見小路" }
            ]
        },
        {
            day: 2, date: "05/15 (四)", title: "京都經典",
            activities: [
                { name: "清水寺", desc: "和服體驗、二年坂、三年坂", map: "https://www.google.com/maps/search/?api=1&query=清水寺" },
                { name: "八坂神社", desc: "祈求平安與美容", map: "https://www.google.com/maps/search/?api=1&query=八坂神社" }
            ]
        },
        {
            day: 3, date: "05/16 (五)", title: "移動至大阪",
            activities: [
                { name: "錦市場", desc: "京都的廚房", map: "https://www.google.com/maps/search/?api=1&query=錦市場" },
                { name: "艾思利德酒店 難波南III", desc: "大阪住宿 Check-in", map: "https://www.google.com/maps/search/?api=1&query=ESLEAD+HOTEL+Namba+South+III" }
            ]
        }
    ];

    // --- 渲染邏輯 ---
    function render() {
        const container = document.getElementById('itinerary-content');
        container.innerHTML = tripData.map(day => `
            <div class="day-box">
                <div class="day-header">
                    <span class="day-number">Day ${day.day}</span>
                    <span style="margin-left:10px; font-weight:bold;">${day.date}</span>
                    <div style="color:#666; font-size:0.9em; margin-top:5px;">${day.title}</div>
                </div>
                ${day.activities.map(act => `
                    <div class="activity">
                        <span class="act-name">📍 ${act.name}</span>
                        <span class="act-desc">${act.desc}</span>
                        <br>
                        ${act.map ? `<a href="${act.map}" target="_blank" class="map-link">🗺️ 查看地圖</a>` : ''}
                    </div>
                `).join('')}
            </div>
        `).join('');
    }

    // --- 下載備份檔 ---
    function downloadConfig() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(tripData, null, 2));
        const a = document.createElement('a');
        a.href = dataStr;
        a.download = "trip_backup.json";
        a.click();
    }

    window.onload = render;
</script>

</body>
</html>
